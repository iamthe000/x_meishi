<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="meishi-card" id="meishi">
    <div class="logo-area">
      <img id="icon" src="https://abs.twimg.com/sticky/default_profile_images/default_profile_400x400.png" alt="ロゴ">
    </div>
    
    <div class="main-info">
      <div class="id-text" id="userid">@username</div>
      <div class="name-text" id="username">ユーザー名</div>
    </div>
    
    <div class="sub-info">
      <div class="bio-text" id="bio">プロフィールを開いて「名刺を作成」ボタンを押してください。</div>
      <div class="stats-box">
        <span>フォロー <span id="following">0</span></span> ｜ 
        <span>フォロワー <span id="followers">0</span></span>
      </div>
      <div class="date-text" id="joined">20XX年X月登録</div>
    </div>
  </div>
  
  <button id="generate-btn">名刺を作成する</button>
  
  <script src="popup.js"></script>
</body>
</html>
